name: IntelliPipe CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/intellipipe
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────
  # Code Quality Gates
  # ────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff black mypy

      - name: Run Ruff linter
        run: ruff check src/ tests/ --output-format=github

      - name: Check Black formatting
        run: black --check src/ tests/

      - name: Run MyPy type checks
        run: mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Warn only in CI, enforce in pre-commit

  # ────────────────────────────────────────
  # Security Scanning
  # ────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Run Bandit SAST
        uses: PyCQA/bandit-action@v1
        with:
          targets: src/
          severity: high
          confidence: high

      - name: Install dependencies
        run: pip install -r requirements/base.txt -r requirements/api.txt

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit

  # ────────────────────────────────────────
  # Unit Tests
  # ────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/base.txt -r requirements/api.txt -r requirements/test.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=20 \
            -v \
            --tb=short \
            -n auto
        env:
          PYTHONPATH: .

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: coverage.xml
          flags: unit-tests

  # ────────────────────────────────────────
  # Integration Tests (with Docker services)
  # ────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: intellipipe
          POSTGRES_PASSWORD: intellipipe
          POSTGRES_DB: intellipipe
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/base.txt -r requirements/api.txt -r requirements/test.txt

      - name: Run DB migrations
        run: alembic upgrade head
        env:
          DB_HOST: localhost
          DB_USER: intellipipe
          DB_PASSWORD: intellipipe
          DB_NAME: intellipipe

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -n 4 \
            --timeout=60
        env:
          PYTHONPATH: .
          DB_HOST: localhost
          DB_USER: intellipipe
          DB_PASSWORD: intellipipe
          DB_NAME: intellipipe
          REDIS_HOST: localhost
          LLM_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST || 'dummy-key' }}
          API_SECRET_KEY: test-secret-key

  # ────────────────────────────────────────
  # Docker Build + Push
  # ────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [api, pipeline, airflow]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────
  # dbt Schema Validation
  # ────────────────────────────────────────
  dbt-validation:
    name: dbt Parse & Schema Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: dbt parse (compile check)
        run: |
          cd dbt
          dbt parse --profiles-dir . --project-dir .
        env:
          DBT_TARGET: ci

      - name: Validate dbt schema files
        run: |
          cd dbt
          python -c "
          import yaml, glob, sys
          errors = []
          for f in glob.glob('models/**/*.yml', recursive=True):
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All {len(list(glob.glob(\"models/**/*.yml\", recursive=True)))} YAML files valid')
          "

  # ────────────────────────────────────────
  # Deploy to Staging
  # ────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, integration-tests, dbt-validation]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.intellipipe.io

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy to Kubernetes (staging)
        run: |
          # Update image tags
          kubectl set image deployment/intellipipe-api \
            api=${{ env.IMAGE_BASE }}-api:sha-${{ github.sha }} \
            -n intellipipe-staging

          kubectl set image deployment/intellipipe-alert-processor \
            processor=${{ env.IMAGE_BASE }}-pipeline:sha-${{ github.sha }} \
            -n intellipipe-staging

          # Wait for rollout
          kubectl rollout status deployment/intellipipe-api -n intellipipe-staging --timeout=300s

      - name: Run smoke tests
        run: |
          sleep 10
          curl -f https://staging-api.intellipipe.io/health

  # ────────────────────────────────────────
  # Deploy to Production
  # ────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment:
      name: production
      url: https://intellipipe.io

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Run DB migrations
        run: |
          kubectl run db-migrate-${{ github.sha }} \
            --image=${{ env.IMAGE_BASE }}-api:sha-${{ github.sha }} \
            --restart=Never \
            --rm \
            --attach \
            -n intellipipe-prod \
            -- alembic upgrade head

      - name: Blue-green deploy API
        run: |
          kubectl set image deployment/intellipipe-api \
            api=${{ env.IMAGE_BASE }}-api:sha-${{ github.sha }} \
            -n intellipipe-prod

          kubectl rollout status deployment/intellipipe-api -n intellipipe-prod --timeout=600s

      - name: Production smoke test
        run: |
          sleep 15
          curl -f https://api.intellipipe.io/health

      - name: Notify Slack of deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Production deploy ${{ job.status }}: sha-${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
