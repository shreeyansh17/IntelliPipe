global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: intellipipe-local
    environment: development

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: intellipipe-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9308"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: airflow
    static_configs:
      - targets: ["airflow-webserver:8090"]
    metrics_path: /metrics
